name: ping-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ping}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ping}
      POSTGRES_DB: ${POSTGRES_DB:-ping}
    ports:
      - "5432:5432"
    volumes:
      - ping_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ping}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ping_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local SMTP sink for alert-email development. SMTP on 1025, web UI on 8025.
  # Point SMTP_HOST=localhost SMTP_PORT=1025 at it (see .env.example); it
  # accepts everything and never forwards mail anywhere.
  mailpit:
    image: axllent/mailpit:v1.20
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  ping_postgres_data:
  ping_redis_data:
